version: "3.9"
services:
  api:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/agentic_ai
    depends_on:
      postgres:
        condition: service_healthy
    networks: [agentic-net]

  postgres:
    image: postgres:15-alpine
    environment: {POSTGRES_DB: agentic_ai, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s; timeout: 5s; retries: 5
    networks: [agentic-net]

  chromadb:
    image: chromadb/chroma:latest
    ports: ["8001:8000"]
    volumes: [chromadata:/chroma/chroma]
    networks: [agentic-net]

volumes:
  pgdata:
  chromadata:

networks:
  agentic-net:
    driver: bridge
